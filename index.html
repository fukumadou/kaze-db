<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fujii Kaze Global Accordion DB</title>
  <style>
    :root {
      --cream: #f8f1e5;
      --sand: #eadcc6;
      --linen: #fffaf1;
      --sage: #7d8b68;
      --olive: #5f6c4f;
      --wood: #8a6741;
      --ink: #2d2a22;
      --muted: #776d5e;
      --line: rgba(92, 75, 49, 0.18);
      --card: rgba(255, 250, 241, 0.78);
      --shadow: 0 18px 50px rgba(74, 56, 32, 0.13);
      --radius: 28px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans JP", "Hiragino Sans", sans-serif;
      background:
        radial-gradient(circle at 12% 18%, rgba(125,139,104,.18), transparent 30%),
        radial-gradient(circle at 88% 8%, rgba(138,103,65,.18), transparent 34%),
        linear-gradient(135deg, var(--cream), #edf1e4 58%, #f7ead8);
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }
    .wrap { width: min(980px, 92vw); margin: auto; }

    .site-header {
      background: linear-gradient(180deg, rgba(255,250,241,.94), rgba(234,220,198,.88));
      border-bottom: 1px solid var(--line);
      box-shadow: 0 8px 30px rgba(74, 56, 32, 0.08);
    }

    .hero-image-link {
      display: block;
      width: 100%;
      line-height: 0;
      overflow: hidden;
      background: #d7c0a0;
    }

    .hero-image {
      display: block;
      width: 100%;
      height: clamp(180px, 34vw, 430px);
      object-fit: cover;
      object-position: center;
      transition: transform .55s ease, filter .55s ease;
    }

    .hero-image-link:hover .hero-image {
      transform: scale(1.015);
      filter: saturate(1.04) contrast(1.02);
    }

    .nav-bar {
      position: sticky;
      top: 0;
      z-index: 30;
      backdrop-filter: blur(18px);
      background: rgba(248, 241, 229, .82);
      border-bottom: 1px solid var(--line);
    }

    .menu {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(8px, 3vw, 24px);
      padding: 12px 0;
      flex-wrap: wrap;
    }

    .menu a {
      min-width: 96px;
      text-align: center;
      padding: 10px 18px;
      border-radius: 999px;
      color: var(--wood);
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 700;
      letter-spacing: .08em;
      background: rgba(255,255,255,.38);
      border: 1px solid transparent;
      transition: .25s ease;
    }

    .menu a:hover {
      border-color: var(--line);
      background: rgba(255,250,241,.9);
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(74, 56, 32, 0.12);
    }

    .intro {
      padding: 52px 0 26px;
      text-align: center;
      position: relative;
    }

    .intro::before,
    .intro::after {
      content: "☙";
      position: absolute;
      top: 40px;
      color: rgba(95,108,79,.32);
      font-size: clamp(34px, 7vw, 70px);
      transform: rotate(-18deg);
    }

    .intro::before { left: 4%; }
    .intro::after { right: 4%; transform: rotate(18deg); }

    .eyebrow {
      color: var(--wood);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 13px;
      letter-spacing: .22em;
      font-weight: 700;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(38px, 9vw, 82px);
      line-height: .95;
      letter-spacing: .12em;
      font-weight: 500;
      color: #6f5436;
      text-transform: none;
    }

    .lead {
      margin: 16px auto 0;
      max-width: 720px;
      color: var(--muted);
      line-height: 1.9;
      font-size: clamp(14px, 3.5vw, 18px);
    }

    .searchBox {
      margin: 28px auto 8px;
      max-width: 760px;
      position: relative;
    }

    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 18px 52px 18px 22px;
      background: rgba(255,250,241,.9);
      box-shadow: var(--shadow);
      font-size: 16px;
      color: var(--ink);
      outline: none;
    }

    input:focus {
      border-color: rgba(138,103,65,.46);
      box-shadow: 0 18px 50px rgba(95,108,79,.15);
    }

    .searchMark {
      position: absolute;
      right: 20px;
      top: 50%;
      translate: 0 -50%;
      color: var(--wood);
      opacity: .7;
      pointer-events: none;
    }

    section { padding: 30px 0; }

    h2 {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 0 0 18px;
      color: var(--olive);
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(25px, 6vw, 40px);
      letter-spacing: .12em;
      font-weight: 500;
      text-transform: uppercase;
    }

    h2 span { font-size: .72em; }
    .accordion { display: grid; gap: 14px; }

    details {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    summary {
      cursor: pointer;
      list-style: none;
      padding: 20px 22px;
      display: grid;
      grid-template-columns: 42px 1fr 34px;
      gap: 14px;
      align-items: center;
    }

    summary::-webkit-details-marker { display: none; }

    .leafIcon {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(138,103,65,.10);
      color: var(--sage);
      font-size: 22px;
    }

    .meta { display: grid; gap: 4px; }

    .tag {
      font-size: 12px;
      color: var(--wood);
      font-weight: 900;
      letter-spacing: .11em;
      text-transform: uppercase;
    }

    .title {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(17px, 4.4vw, 25px);
      font-weight: 700;
      letter-spacing: .01em;
    }

    .date {
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
    }

    .chev {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: var(--wood);
      background: rgba(95,108,79,.11);
      transition: .3s ease;
      font-weight: 900;
    }

    details[open] .chev {
      rotate: 45deg;
      background: rgba(138,103,65,.15);
    }

    .content {
      max-height: 0;
      overflow: hidden;
      transition: max-height .45s ease;
      border-top: 1px solid var(--line);
    }

    details[open] .content { max-height: 2600px; }

    .songs {
      display: grid;
      gap: 10px;
      padding: 18px;
    }

    .song {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 14px;
      border-radius: 20px;
      background: rgba(255,255,255,.44);
      border: 1px solid rgba(92,75,49,.10);
    }

    .songName {
      font-weight: 850;
      line-height: 1.45;
    }

    .songName small {
      display: block;
      color: var(--muted);
      font-weight: 700;
      margin-top: 2px;
    }

    .links {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .song a,
    .official a {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border-radius: 999px;
      padding: 9px 13px;
      background: rgba(255,250,241,.75);
      border: 1px solid var(--line);
      color: var(--wood);
      font-weight: 850;
      font-size: 12px;
      transition: .25s ease;
      white-space: nowrap;
    }

    .song a:hover,
    .official a:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(74, 56, 32, 0.13);
      background: rgba(255,250,241,.98);
    }

    .official-footer {
      margin-top: 38px;
      padding: 42px 0 48px;
      text-align: center;
      color: rgba(255,250,241,.92);
      background:
        radial-gradient(circle at 20% 0%, rgba(255,250,241,.16), transparent 32%),
        linear-gradient(135deg, #6d755a, #8a6741);
    }

    .official-footer h2 {
      justify-content: center;
      color: rgba(255,250,241,.94);
      font-size: clamp(20px, 5vw, 30px);
      margin-bottom: 22px;
    }

    .official {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .official a {
      min-width: 126px;
      justify-content: center;
      color: #5f513d;
      background: rgba(255,250,241,.88);
    }

    .copyright {
      margin-top: 28px;
      color: rgba(255,250,241,.72);
      font-size: 13px;
    }

    .hidden { display: none !important; }

    @media (max-width: 640px) {
      .hero-image { height: 210px; }

      .menu {
        gap: 6px;
        padding: 10px 0;
      }

      .menu a {
        min-width: auto;
        flex: 1;
        padding: 10px 8px;
        font-size: 13px;
        letter-spacing: .04em;
      }

      .intro {
        padding: 40px 0 20px;
        text-align: left;
      }

      .intro::before,
      .intro::after { display: none; }

      h1 { letter-spacing: .08em; }

      summary {
        grid-template-columns: 34px 1fr 30px;
        gap: 10px;
        padding: 17px 15px;
      }

      .leafIcon {
        width: 34px;
        height: 34px;
        font-size: 18px;
      }

      .song { grid-template-columns: 1fr; }
      .links { justify-content: flex-start; }
      .song a { padding: 8px 11px; }
    }
  </style>
</head>

          { name: "青春病 (Seishun Sick) 2020.10.30", spotify: "https://open.spotify.com/search/Seishun%20Sick%20Fujii%20Kaze/tracks" },
          { name: "キリがないから (Kiri Going On) 2020.05.15", spotify: "https://open.spotify.com/track/0puZUrjhNhWl98RdE7YfNM" },
          { name: "優しさ (Yasashisa) 2020.04.17", spotify: "https://open.spotify.com/track/57u1FaZlztApkcT5x5XNuD" },
          { name: "もうええわ (Mo-Eh-Wa) 2019.12.24", spotify: "https://open.spotify.com/track/1JRNrJKTQhfvxII8kkIcAQ" },
          { name: "何なんw (Nan-Nan) 2019.11.18", spotify: "https://open.spotify.com/track/2CbGuO0LtVvbh3umN3mDwM" }
        ]
      }
    ];

    const cleanSongTitle = song =>
      song
        .replace(/\d{4}\.\d{2}\.\d{2}/g, "")
        .replace(/\(.+?\)/g, "")
        .trim();

    const youtubeSearch = song =>
      `https://www.youtube.com/results?search_query=${encodeURIComponent("Fujii Kaze " + cleanSongTitle(song) + " official")}`;

    function createCard(item) {
      const text = `${item.cat} ${item.title} ${item.date} ${item.songs.map(song => song.name).join(" ")}`.toLowerCase();

      return `
        <details class="item" data-text="${text}">
          <summary>
            <span class="leafIcon">☙</span>
            <span class="meta">
              <span class="tag">${item.cat}</span>
              <span class="title">${item.title}</span>
              <span class="date">${item.date}</span>
            </span>
            <span class="chev">＋</span>
          </summary>
          <div class="content">
            <div class="songs">
              ${item.songs.map(song => `
                <div class="song">
                  <div class="songName">
                    ${song.name}
                    <small>Fujii Kaze / 藤井風</small>
                  </div>
                  <div class="links">
                    <a href="${youtubeSearch(song.name)}" target="_blank" rel="noopener">▶ YouTube</a>
                    <a href="${song.spotify}" target="_blank" rel="noopener">♫ Spotify</a>
                  </div>
                </div>
              `).join("")}
            </div>
          </div>
        </details>
      `;
    }

    document.getElementById("albumList").innerHTML = albums.map(createCard).join("");
    document.getElementById("singleList").innerHTML = singles.map(createCard).join("");

    const search = document.getElementById("search");
    const allItems = [...document.querySelectorAll(".item")];

    search.addEventListener("input", e => {
      const q = e.target.value.trim().toLowerCase();

      allItems.forEach(item => {
        item.open = false;
        item.classList.remove("hidden");

        if (!q) return;

        const hit = item.dataset.text.includes(q);
        item.classList.toggle("hidden", !hit);
        if (hit) item.open = true;
      });
    });

    search.addEventListener("search", () => {
      if (!search.value) {
        allItems.forEach(item => {
          item.open = false;
          item.classList.remove("hidden");
        });
      }
    });
  </script>
</body>
</html>
