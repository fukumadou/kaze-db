<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>劇団FUKUMADOU - 藤井風 楽曲データベース</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #1db954;
            margin-bottom: 30px;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background-color: #1e1e1e;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border: 1px solid #282828;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card h2 {
            margin-top: 0;
            color: #ffffff;
            font-size: 1.4rem;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .btn {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .btn-yt {
            background-color: #ff0000;
            color: #ffffff;
        }
        .btn-sp {
            background-color: #1db954;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <h1>劇団FUKUMADOU<br>藤井風 楽曲データベース</h1>

    <div class="grid-container">
        <div class="card">
            <h2>満ちてゆく</h2>
            <div class="btn-group">
                <a href="https://youtu.be/Cc6wN4M7EJA" target="_blank" class="btn btn-yt">YouTube</a>
                <a href="https://open.spotify.com/intl-ja/track/4M69RjJpG1B6Oclw9L8pW0" target="_blank" class="btn btn-sp">Spotify</a>
            </div>
        </div>

        <div class="card">
            <h2>死ぬのがいいわ</h2>
            <div class="btn-group">
                <a href="https://youtu.be/dawrQnvwMTY" target="_blank" class="btn btn-yt">YouTube</a>
                <a href="https://open.spotify.com/intl-ja/track/0wM4639N6w2899wZ6wM541" target="_blank" class="btn btn-sp">Spotify</a>
            </div>
        </div>

        <div class="card">
            <h2>まつり</h2>
            <div class="btn-group">
                <a href="https://youtu.be/NwOvu-j_WjY" target="_blank" class="btn btn-yt">YouTube</a>

            </div>
        </div>

        <div class="card">
            <h2>きらり</h2>
            <div class="btn-group">
                <a href="https://youtu.be/TcLLpZwsF_E" target="_blank" class="btn btn-yt">YouTube</a>
                <a href="https://open.spotify.com/intl-ja/track/4W889e4Y9m6o0Jj0y7q3wX" target="_blank" class="btn btn-sp">Spotify</a>
            </div>
        </div>

        <div class="card">
            <h2>何なんw</h2>
            <div class="btn-group">
                <a href="https://youtu.be/Nt6ZwuVzOS4" target="_blank" class="btn btn-yt">YouTube</a>
                <a href="https://open.spotify.com/intl-ja/track/0wS07Xw29m8O9y6M139pJW" target="_blank" class="btn btn-sp">Spotify</a>
            </div>

        <div class="card">

</body>
</html>
