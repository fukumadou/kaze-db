<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fujii Kaze Global Discography Database</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#f6f4ef;
    --card:#ffffffcc;
    --text:#2c2c2c;
    --muted:#6b6b6b;
    --accent:#8e7b63;
    --accent2:#b89d7d;
    --line:#e8e0d6;
    --shadow:0 12px 40px rgba(0,0,0,.08);
    --radius:20px;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:"Inter","Noto Sans JP",sans-serif;
    color:var(--text);
    background:
        radial-gradient(circle at top left,#fff8ef 0%,transparent 40%),
        radial-gradient(circle at bottom right,#efe7da 0%,transparent 40%),
        linear-gradient(135deg,#f7f5f0,#efe7de);
    min-height:100vh;
    line-height:1.7;
}

.container{
    width:min(1100px,92%);
    margin:auto;
}

header{
    padding:28px 0 10px;
    text-align:center;
}

.logo-link{
    display:inline-block;
    transition:.3s;
}

.logo-link:hover{
    transform:translateY(-3px);
}

.logo{
    width:min(340px,88vw);
    border-radius:24px;
    box-shadow:var(--shadow);
}

.hero-title{
    margin-top:18px;
    font-size:clamp(1.4rem,4vw,2.5rem);
    font-weight:700;
    letter-spacing:.04em;
}

.hero-sub{
    color:var(--muted);
    margin-top:8px;
    font-size:.95rem;
}

nav{
    margin:28px auto 24px;
    display:flex;
    justify-content:center;
    gap:12px;
    flex-wrap:wrap;
}

nav a{
    text-decoration:none;
    color:#fff;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    padding:11px 20px;
    border-radius:999px;
    font-weight:600;
    transition:.25s;
}

nav a:hover{
    transform:translateY(-2px);
}

.search-wrap{
    display:flex;
    justify-content:center;
    margin:18px auto 40px;
}

.search{
    width:min(860px,100%);
    padding:16px 20px;
    border:none;
    outline:none;
    border-radius:18px;
    background:rgba(255,255,255,.88);
    box-shadow:var(--shadow);
    font-size:1rem;
}

.section-title{
    margin:40px 0 18px;
    font-size:1.8rem;
    font-weight:700;
}

.accordion{
    display:grid;
    gap:16px;
}

.item{
    background:var(--card);
    backdrop-filter:blur(12px);
    border:1px solid var(--line);
    border-radius:var(--radius);
    overflow:hidden;
    box-shadow:var(--shadow);
}

.trigger{
    width:100%;
    background:none;
    border:none;
    cursor:pointer;
    padding:22px;
    text-align:left;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
}

.trigger h3{
    font-size:1.05rem;
}

.trigger small{
    color:var(--muted);
}

.icon{
    font-size:1.4rem;
    transition:.3s;
}

.item.active .icon{
    transform:rotate(45deg);
}

.content{
    max-height:0;
    overflow:hidden;
    transition:max-height .45s ease;
}

.inner{
    padding:0 22px 22px;
}

.song-list{
    list-style:none;
    display:grid;
    gap:12px;
}

.song{
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:12px;
    border:1px solid #eee4d8;
    border-radius:14px;
    background:#fffdfb;
}

.song-name{
    font-weight:500;
}

.links{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
}

.btn{
    text-decoration:none;
    padding:8px 12px;
    border-radius:10px;
    font-size:.85rem;
    font-weight:600;
    transition:.25s;
}

.spotify{
    background:#1DB954;
    color:#fff;
}

.youtube{
    background:#ff3131;
    color:#fff;
}

.btn:hover{
    transform:translateY(-2px);
}

footer{
    margin-top:70px;
    padding:50px 0;
}

.footer-box{
    background:rgba(255,255,255,.75);
    border:1px solid var(--line);
    border-radius:24px;
    padding:28px;
    text-align:center;
    box-shadow:var(--shadow);
}

.footer-box h3{
    margin-bottom:18px;
}

.socials{
    display:flex;
    justify-content:center;
    gap:14px;
    flex-wrap:wrap;
}

.socials a{
    text-decoration:none;
    color:#fff;
    padding:12px 18px;
    border-radius:14px;
    font-weight:600;
}

.site{background:#8e7b63;}
.yt{background:#ff3131;}
.ig{
    background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045);
}

.footer-note{
    margin-top:18px;
    color:var(--muted);
    font-size:.9rem;
}

.hidden{
    display:none !important;
}

@media(max-width:640px){

.song{
    align-items:flex-start;
}

.links{
    width:100%;
}

.btn{
    flex:1;
    text-align:center;
}

.trigger{
    padding:18px;
}

.inner{
    padding:0 18px 18px;
}
}
</style>
</head>

<script>
const songLists = document.querySelectorAll(".song-list");

function createSong(name){

const query = encodeURIComponent("Fujii Kaze " + name);

return `
<li class="song">
<div class="song-name">${name}</div>

<div class="links">

<a class="btn spotify"
target="_blank"
rel="noopener"
href="https://open.spotify.com/search/${query}">
Spotify
</a>

<a class="btn youtube"
target="_blank"
rel="noopener"
href="https://www.youtube.com/results?search_query=${query}">
YouTube
</a>

</div>
</li>
`;
}

songLists.forEach(list=>{

let songs=[];

if(list.dataset.songs){
    songs = JSON.parse(list.dataset.songs);
}else if(document.getElementById("prema-data")){
    songs = JSON.parse(document.getElementById("prema-data").textContent);
}

list.innerHTML = songs.map(createSong).join("");
});

const items=document.querySelectorAll(".item");

items.forEach(item=>{
const trigger=item.querySelector(".trigger");
const content=item.querySelector(".content");

trigger.addEventListener("click",()=>{

const active=item.classList.contains("active");

items.forEach(i=>{
i.classList.remove("active");
i.querySelector(".content").style.maxHeight=null;
});

if(!active){
item.classList.add("active");
content.style.maxHeight=content.scrollHeight+"px";
}
});
});

const search=document.getElementById("search");

search.addEventListener("input",e=>{

const term=e.target.value.toLowerCase().trim();

if(term===""){
items.forEach(item=>{
item.classList.remove("active");
item.querySelector(".content").style.maxHeight=null;
item.classList.remove("hidden");
});
return;
}

items.forEach(item=>{

const text=item.textContent.toLowerCase();
const match=text.includes(term);

item.classList.toggle("hidden",!match);

if(match){
item.classList.add("active");
const content=item.querySelector(".content");
content.style.maxHeight=content.scrollHeight+"px";
}
});

});
</script>
